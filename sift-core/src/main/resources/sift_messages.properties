# Basic Elements
explain.anyChar=Matches any character
explain.anchor.start=Starts at the beginning of the line
explain.anchor.end=Ends at the end of the line
explain.literal=Matches the literal character ''{0}''
explain.linebreak=Matches a line break
explain.wordBoundary=Matches a word boundary

# Classes & Ranges
explain.classRange.known=Matches {0} ({1})
explain.classRange=Matches a character from the custom range ({0})
explain.classInclusion=Matches any of the included characters ({0})
explain.classExclusion=Matches any character EXCEPT the excluded ones ({0})
explain.customRange=Matches a character in the range from ''{0}'' to ''{1}''
explain.classIntersection=Intersected with class ({0})

# Groups & Structural
explain.backreference=Matches the same text as most recently matched by the capturing group ''{0}''
explain.pattern=Matches the following pattern:
explain.atomicGroup=Atomic group (matches the following without backtracking):
explain.captureGroup=Capturing group:
explain.nonCapturingGroup=Non-capturing group:
explain.namedCapture=Named capturing group ''{0}'':
explain.localFlags=With local flags {0}:

# Lookarounds
explain.lookahead.positive=Positive lookahead (ensures the following matches immediately to the right):
explain.lookahead.negative=Negative lookahead (ensures the following does NOT match immediately to the right):
explain.lookbehind.positive=Positive lookbehind (ensures the following matches immediately to the left):
explain.lookbehind.negative=Negative lookbehind (ensures the following does NOT match immediately to the left):

# Alternations & Conditionals
explain.anyOf=Matches any ONE of the following alternatives:
explain.anyOf.option=Alternative {0}:
explain.conditional=Conditional pattern:
explain.conditional.if=If condition matches:
explain.conditional.then=Then match:
explain.conditional.else=Else match:

# Quantifiers
explain.quantifier.optional=optionally (0 or 1 time)
explain.quantifier.zeroOrMore=zero or more times
explain.quantifier.oneOrMore=one or more times
explain.quantifier.exact=exactly {0} times
explain.quantifier.min=at least {0} times
explain.quantifier.range=between {0} and {1} times

# Modifiers
explain.modifier.lazy=(lazy: matches as few times as possible)
explain.modifier.possessive=(possessive: matches as many times as possible, no backtracking)
explain.globalFlags=Applies inline global flags: {0}
explain.anchor.previous=Starts at the end of the previous match

